name: Expert Reviews Scraper

on:
  schedule:
    - cron: '0 3 * * *'   # Every day at 03:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Scrape user reviews for all models
        env:
          APP_URL: ${{ secrets.APP_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          # make_slug:model_slug pairs matching src/data/cars.ts
          MODELS=(
            "toyota:corolla"
            "toyota:rav4"
            "toyota:camry"
            "toyota:yaris"
            "toyota:c-hr"
            "toyota:corolla-cross"
            "hyundai:tucson"
            "hyundai:elantra"
            "hyundai:ioniq5"
            "hyundai:kona"
            "hyundai:i30"
            "kia:sportage"
            "kia:niro"
            "kia:picanto"
            "kia:stonic"
            "mazda:cx-5"
            "mazda:mazda3"
            "mazda:cx-30"
            "volkswagen:golf"
            "volkswagen:tiguan"
            "volkswagen:t-roc"
            "volkswagen:polo"
            "skoda:octavia"
            "skoda:karoq"
            "skoda:kodiaq"
            "honda:civic"
            "honda:hr-v"
            "honda:jazz"
            "bmw:3-series"
            "bmw:x3"
            "mercedes:c-class"
            "mercedes:a-class"
            "ford:kuga"
            "ford:puma"
            "nissan:qashqai"
            "nissan:juke"
            "peugeot:3008"
            "renault:megane"
            "subaru:forester"
            "mitsubishi:outlander"
          )

          for entry in "${MODELS[@]}"; do
            MAKE="${entry%%:*}"
            MODEL="${entry##*:}"

            echo "→ $MAKE / $MODEL"

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$APP_URL/api/expert-reviews" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $SCRAPER_API_KEY" \
              -d "{\"makeSlug\":\"$MAKE\",\"modelSlug\":\"$MODEL\"}")

            echo "  HTTP $STATUS"
            sleep 4   # rate-limit Gemini free tier (15 RPM)
          done

          echo "✅ Done"
