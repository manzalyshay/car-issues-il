  <circle cx="16" cy="24.5" r="1.3" fill="#e63946"/>
  <line x1="16"   y1="21.2" x2="16"   y2="23.2" stroke="#e63946" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="13.0" y1="26.2" x2="14.6" y2="25.2" stroke="#e63946" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="19.0" y1="26.2" x2="17.4" y2="25.2" stroke="#e63946" stroke-width="0.9" stroke-linecap="round"/>
</svg>
