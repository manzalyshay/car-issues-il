<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
  </defs>
  <!-- red gradient background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- car body (white) -->
  <rect x="3" y="18" width="26" height="7" rx="2" fill="white"/>
  <!-- car roof / cabin -->
  <path d="M8,18 L11,11 Q12,10 13.5,10 L18.5,10 Q20,10 21,11 L24,18 Z" fill="white"/>
  <!-- windshield (semi-transparent cutout) -->
  <path d="M12,17.5 L14,12.5 Q14.5,12 15,12 L17,12 Q17.5,12 18,12.5 L20,17.5 Z" fill="rgba(230,57,70,0.7)"/>
  <!-- wheels -->
  <circle cx="10" cy="25" r="2.8" fill="url(#g)" stroke="white" stroke-width="1.5"/>
  <circle cx="22" cy="25" r="2.8" fill="url(#g)" stroke="white" stroke-width="1.5"/>
</svg>
