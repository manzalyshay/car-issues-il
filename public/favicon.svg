<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Red background -->
  <circle cx="16" cy="16" r="15.5" fill="#e63946"/>
  <!-- Bold white warning triangle -->
  <path d="M16 5 L30 27.5 L2 27.5 Z" fill="white"/>
  <!-- Red steering wheel inside triangle -->
  <circle cx="16" cy="19.5" r="5" stroke="#e63946" stroke-width="1.8" fill="none"/>
  <!-- Spokes: top, bottom-left, bottom-right (120° apart) -->
  <line x1="16" y1="17.7" x2="16" y2="15.2" stroke="#e63946" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14.3" y1="20.3" x2="12.0" y2="23.0" stroke="#e63946" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17.7" y1="20.3" x2="20.0" y2="23.0" stroke="#e63946" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="16" cy="19.5" r="1.5" fill="#e63946"/>
</svg>
