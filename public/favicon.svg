<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Red background -->
  <circle cx="16" cy="16" r="15.5" fill="#e63946"/>

  <!-- Thin outer bezel ring -->
  <circle cx="16" cy="16" r="13.5" stroke="white" stroke-width="0.75" fill="none" opacity="0.3"/>

  <!-- Gauge arc: 7 o'clock → 5 o'clock (300° sweep) at r=10 -->
  <path d="M 11 24.66 A 10 10 0 1 1 21 24.66"
        stroke="white" stroke-width="1.8" fill="none" stroke-linecap="butt"/>

  <!-- Major tick at 9 o'clock (180°): r=10 outer, r=8 inner -->
  <line x1="4" y1="16" x2="6.5" y2="16" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Major tick at 12 o'clock (270°) -->
  <line x1="16" y1="4" x2="16" y2="6.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Major tick at 3 o'clock (0°) -->
  <line x1="28" y1="16" x2="25.5" y2="16" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Minor ticks at 10:30 (225°) and 1:30 (315°) -->
  <!-- 225°: cos=−0.707 sin=−0.707 → outer r=12: (7.5,7.5) inner r=10: (8.93,8.93) -->
  <line x1="7.5" y1="7.5" x2="9.0" y2="9.0" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
  <!-- 315°: cos=0.707 sin=−0.707 → outer r=12: (24.5,7.5) inner r=10: (23.1,9.0) -->
  <line x1="24.5" y1="7.5" x2="23.0" y2="9.0" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>

  <!-- Needle to ~2 o'clock (330° SVG): cos=0.866 sin=−0.5, length=9 → (23.8, 11.5) -->
  <line x1="16" y1="16" x2="23.8" y2="11.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Needle counter-tail (150°): length=2 → (14.27, 17) -->
  <line x1="16" y1="16" x2="14.3" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- Center hub: white ring + red dot -->
  <circle cx="16" cy="16" r="2.8" fill="white"/>
  <circle cx="16" cy="16" r="1.2" fill="#e63946"/>
</svg>
