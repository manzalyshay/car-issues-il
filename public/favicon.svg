<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
  </defs>
  <!-- rounded square background matching header -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- car emoji-style: body + windows + wheels -->
  <g fill="white">
    <!-- car body -->
    <rect x="3" y="17" width="26" height="8" rx="2"/>
    <!-- car roof/cabin -->
    <path d="M9,17 L11.5,11 Q12.5,10 14,10 L18,10 Q19.5,10 20.5,11 L23,17 Z"/>
    <!-- windshield cutout (grey tint) -->
    <rect x="13" y="11.5" width="6" height="4" rx="1" fill="rgba(0,0,0,0.25)"/>
  </g>
  <!-- wheels -->
  <circle cx="10" cy="25" r="3" fill="url(#g)" stroke="white" stroke-width="1.5"/>
  <circle cx="22" cy="25" r="3" fill="url(#g)" stroke="white" stroke-width="1.5"/>
</svg>
