<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="8" fill="white"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#4a4a4a" stroke-width="4"/>
  <!-- Three-pointed star: lines from center to circle edge at 0°, 120°, 240° (top, bottom-right, bottom-left) -->
  <!-- Top point: (50, 7) = 50 + 43*sin(-90°), 50 + 43*cos(-90°) -->
  <!-- Bottom-right: (50 + 43*sin(30°), 50 + 43*cos(30°)) = (50+21.5, 50+37.2) = (71.5, 87.2) -->
  <!-- Bottom-left: (50 - 43*sin(30°), 50 + 43*cos(30°)) = (28.5, 87.2) -->
  <line x1="50" y1="50" x2="50" y2="7" stroke="#4a4a4a" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="87.2" y2="71.5" stroke="#4a4a4a" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="12.8" y2="71.5" stroke="#4a4a4a" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Small center dot -->
  <circle cx="50" cy="50" r="3" fill="#4a4a4a"/>
</svg>
