<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f0f1a"/>

  <!-- Car body (main hull) -->
  <rect x="7" y="35" width="50" height="14" rx="3" fill="#dde0f0"/>

  <!-- Cabin / roof section -->
  <path d="M16 35 L21 23 Q23 20 26 20 L38 20 Q41 20 43 23 L48 35 Z" fill="#c5c9e0"/>

  <!-- Windshield -->
  <path d="M25 35 L29 23 L35 23 L39 35 Z" fill="#5b8dd9" opacity="0.8"/>

  <!-- Side windows -->
  <path d="M22 35 L26 24 L28.5 24 L25.5 35 Z" fill="#5b8dd9" opacity="0.55"/>
  <path d="M42 35 L38 24 L35.5 24 L38.5 35 Z" fill="#5b8dd9" opacity="0.55"/>

  <!-- Left headlight -->
  <rect x="7" y="38" width="8" height="4" rx="2" fill="#fff9b0" opacity="0.95"/>

  <!-- Right taillight -->
  <rect x="49" y="38" width="8" height="4" rx="2" fill="#e63946" opacity="0.95"/>

  <!-- Left wheel -->
  <circle cx="18" cy="49" r="6" fill="#1e1e30"/>
  <circle cx="18" cy="49" r="4" fill="#3a3a52"/>
  <circle cx="18" cy="49" r="1.8" fill="#6a6a82"/>

  <!-- Right wheel -->
  <circle cx="46" cy="49" r="6" fill="#1e1e30"/>
  <circle cx="46" cy="49" r="4" fill="#3a3a52"/>
  <circle cx="46" cy="49" r="1.8" fill="#6a6a82"/>

  <!-- IL text on car door -->
  <text x="32" y="45" font-family="Arial,sans-serif" font-size="6.5" font-weight="900"
        fill="#e63946" text-anchor="middle" letter-spacing="0.5">IL</text>

  <!-- Alert badge -->
  <circle cx="51" cy="14" r="10" fill="#e63946"/>
  <!-- Exclamation -->
  <rect x="49.3" y="8.5" width="3.4" height="7" rx="1.7" fill="white"/>
  <circle cx="51" cy="19.2" r="2" fill="white"/>
</svg>
