<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#1a1a2e"/>

  <!-- Car body — simplified side-view silhouette in white -->
  <!-- Main body rectangle -->
  <rect x="10" y="54" width="80" height="20" rx="5" fill="white"/>
  <!-- Cabin trapezoid -->
  <path d="M24 54 L32 36 Q35 31 41 31 L59 31 Q65 31 68 36 L76 54 Z" fill="white"/>
  <!-- Windows cutout (dark) -->
  <path d="M36 53 L42 35 L58 35 L64 53 Z" fill="#1a1a2e" opacity="0.55"/>
  <!-- Wheel arches cutout -->
  <ellipse cx="28" cy="74" rx="12" ry="9" fill="#1a1a2e"/>
  <ellipse cx="72" cy="74" rx="12" ry="9" fill="#1a1a2e"/>
  <!-- Wheels -->
  <circle cx="28" cy="74" r="9" fill="#334"/>
  <circle cx="28" cy="74" r="5" fill="white" opacity="0.25"/>
  <circle cx="28" cy="74" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="72" cy="74" r="9" fill="#334"/>
  <circle cx="72" cy="74" r="5" fill="white" opacity="0.25"/>
  <circle cx="72" cy="74" r="2.5" fill="white" opacity="0.5"/>

  <!-- Red warning badge — top right -->
  <circle cx="76" cy="24" r="16" fill="#e63946"/>
  <!-- Exclamation mark -->
  <rect x="73.5" y="16" width="5" height="11" rx="2.5" fill="white"/>
  <circle cx="76" cy="31" r="2.8" fill="white"/>
</svg>
